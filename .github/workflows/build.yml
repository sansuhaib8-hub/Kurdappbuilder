name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-setuptools python3-dev
        sudo pip3 install --upgrade buildozer
    - name: Build with Buildozer
      run: |
        # دانانی فۆڵدەرە پێویستەکان
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # بیڵدۆزەر خۆی سێرچ دەکات بۆ SDK و دایاندەمەزرێنێت
        # ئێمە تەنها داوای 'yes' دەکەین بۆ هەموو پرسیارەکانی مۆڵەت
        yes | buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
