name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install buildozer
        run: |
          pip3 install --upgrade buildozer cython

      - name: Prepare Buildozer SDK
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk

          mkdir -p $SDK/licenses

          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $SDK/licenses/android-sdk-license
          echo "84835b44136933534d07d1f5624778d91c28c894" >> $SDK/licenses/android-sdk-license

          mkdir -p $SDK/tools/bin
          ln -sf $(which sdkmanager) $SDK/tools/bin/sdkmanager

          yes | $SDK/tools/bin/sdkmanager --licenses || true

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
