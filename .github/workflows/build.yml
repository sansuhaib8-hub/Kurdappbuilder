name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Buildozer SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin

          ln -sf $(which sdkmanager) ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses

          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84835b44136933534d07d1f5624778d91c28c894" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Install Buildozer
        run: |
          pip3 install --upgrade buildozer cython

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
