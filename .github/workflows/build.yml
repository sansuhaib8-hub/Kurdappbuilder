name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Buildozer compiled files
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Android Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libtool-bin \
            autoconf-archive \
            zlib1g-dev

      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user buildozer cython

      - name: Build APK Cleanly
        run: |
          buildozer android debug
