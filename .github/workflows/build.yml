name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Cache Buildozer compiled files
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer/cache
          key: ${{ runner.os }}-buildozer-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install autotools dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool libtool-bin autoconf-archive pkg-config

      - name: Install Buildozer
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user buildozer cython

      - name: Prepare SDK for Buildozer
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK"
          ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools" "$SDK/cmdline-tools"
          ln -sfn "$ANDROID_SDK_ROOT/platform-tools" "$SDK/platform-tools"
          ln -sfn "$ANDROID_SDK_ROOT/build-tools" "$SDK/build-tools"
          ln -sfn "$ANDROID_SDK_ROOT/platforms" "$SDK/platforms"

          mkdir -p "$SDK/tools/bin"
          ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools/16.0/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"
          mkdir -p "$SDK/licenses"
          printf '24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\n84835b44136933534d07d1f5624778d91c28c894\n' > "$SDK/licenses/android-sdk-license"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/16.0/bin/sdkmanager" --licenses

      - name: Build APK
        env:
          ANDROIDSDK: ${{ github.workspace }}/../.buildozer/android/platform/android-sdk
          # لێرەدا بە بەتاڵکردنەوەی ئەم دوو هێڵە، سێرڤەر ناچار دەکەین NDK 27 بەکارنەهێنێت
          ANDROIDNDK: ""
          ANDROID_NDK_HOME: ""
        run: |
          buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
