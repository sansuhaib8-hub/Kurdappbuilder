name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          pip3 install --upgrade buildozer cython

      - name: Prepare Buildozer environment
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses

          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84835b44136933534d07d1f5624778d91c28c894" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin

          ln -sf $(which sdkmanager) ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          export PATH=$HOME/.buildozer/android/platform/android-sdk/tools/bin:$PATH

          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;37.0.0" "platform-tools"

      - name: Build
        run: |
          buildozer android clean
          buildozer android debug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
